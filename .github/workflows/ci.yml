name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: techguide_jp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/techguide_jp_test
      ADMIN_GITHUB_LOGINS: tashua314
      SESSION_SECRET: ci-session-secret
      GITHUB_CLIENT_ID: ci-client-id
      GITHUB_CLIENT_SECRET: ci-client-secret
      GITHUB_PROJECT_TOKEN: ci-project-token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Typecheck
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Migrate test database
        run: pnpm db:migrate

      - name: Test database constraints
        run: pnpm test:db

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E
        run: pnpm e2e

      - name: Build
        run: pnpm build

  migrate-production-database:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-database-migration
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check production database URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "PRODUCTION_DATABASE_URL is not configured."
            exit 1
          fi

      - name: Migrate production database
        run: pnpm db:migrate
